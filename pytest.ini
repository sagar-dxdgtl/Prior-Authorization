[pytest]
markers =
    live: hits real external services (needs prod Stedi key)
    db: needs a local Postgres (preauth_test)
addopts = -ra
# passlib 1.7.4 emits a DeprecationWarning on Python 3.12+ (uses the deprecated
# stdlib `crypt` module). Scope the ignore to passlib only; keep all other
# deprecation warnings visible.
filterwarnings =
    ignore::DeprecationWarning:passlib
